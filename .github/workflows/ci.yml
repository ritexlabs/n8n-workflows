name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          # Provide a dummy token so the required variable check passes during validation
          export N8N_RUNNERS_AUTH_TOKEN=ci-placeholder
          docker compose config --quiet

      - name: Check .env.sample exists and has required keys
        run: |
          required_keys=(
            "N8N_HOST"
            "N8N_PORT"
            "N8N_PROTOCOL"
            "N8N_SECURE_COOKIE"
            "N8N_RUNNERS_AUTH_TOKEN"
            "N8N_DATA_PATH"
            "CLOUDFLARE_TUNNEL_NAME"
            "CLOUDFLARE_HOSTNAME"
          )
          missing=0
          for key in "${required_keys[@]}"; do
            if ! grep -q "^${key}=" .env.sample; then
              echo "Missing key in .env.sample: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All required keys present in .env.sample"

      - name: Verify shell scripts are executable
        run: |
          for script in scripts/*.sh; do
            if [ ! -x "$script" ]; then
              echo "Not executable: $script"
              exit 1
            fi
          done
          echo "All shell scripts are executable"

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
