services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_TRUST_PROXY=true
      - N8N_RUNNERS_MODE=${N8N_RUNNERS_MODE:-external}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=${N8N_RUNNERS_BROKER_LISTEN_ADDRESS:-0.0.0.0}
      - N8N_RUNNERS_BROKER_PORT=${N8N_RUNNERS_BROKER_PORT:-5679}
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?N8N_RUNNERS_AUTH_TOKEN must be set in .env}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
    volumes:
      - ${N8N_DATA_PATH:-./n8n_data}:/home/node/.n8n

  runners:
    image: n8nio/runners:latest
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?N8N_RUNNERS_AUTH_TOKEN must be set in .env}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:${N8N_RUNNERS_BROKER_PORT:-5679}
      - N8N_RUNNERS_CONFIG_PATH=/etc/n8n-task-runners.json
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    depends_on:
      - n8n
